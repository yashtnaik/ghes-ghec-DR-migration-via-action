name: GHES → GHEC Migration via Actions (GEI)

on:
  workflow_dispatch:
    inputs:
      runner:
        description: >
          Runner selector. Use ubuntu-latest for GitHub-hosted.
          For self-hosted, provide JSON array of runner LABELS,
          e.g. ["self-hosted","linux","x64","ghes-migration"].
        required: true
        default: "ubuntu-latest"

      csv_path:
        description: Path to repos.csv in this repository (root or scripts/)
        required: true
        default: repos.csv

      max_concurrent:
        description: Max parallel migrations (keep <= 5)
        required: true
        default: "5"

      # use_github_storage:
      #   description: Pass --use-github-storage to GEI (if enabled for your org)
      #   required: true
      #   default: "true"

      # target_api_url:
      #   description: Optional (GHE.com data residency): https://api.SUBDOMAIN.ghe.com
      #   required: false
      #   default: ""

      run_pre_validation:
        description: Run Stage 1 - pre-migration validation
        required: true
        default: "true"

      run_migration:
        description: Run Stage 2 - migration
        required: true
        default: "true"

      run_post_validation:
        description: Run Stage 3 - post-migration validation
        required: true
        default: "true"

      require_approval:
        description: Require approval between Stage 1 and Stage 2 (issue-based gate)
        required: true
        default: "true"

      approver:
        description: >
          Approver GitHub username OR team slug (org/team).
          If username: approval must come from that user (via /approve comment).
          If team: issue will mention the team; any user comment /approve will be accepted.
        required: false
        default: ""

      approval_timeout_minutes:
        description: How long to wait for approval (minutes)
        required: true
        default: "720"

env:
  # gh CLI auth in Actions
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

  # GEI + scripts
  GH_PAT: ${{ secrets.GH_PAT }}
  GH_SOURCE_PAT: ${{ secrets.GH_SOURCE_PAT }}
  GHES_API_URL: ${{ secrets.GHES_API_URL }}

  # Optional migration behavior (supported by the migration runner)
  USE_GITHUB_STORAGE: ${{ inputs.use_github_storage }}
  TARGET_API_URL: ${{ inputs.target_api_url }}

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  pre_migration_validation:
    name: Stage 1 - Pre-migration validation
    if: ${{ inputs.run_pre_validation == 'true' }}
    runs-on: ${{ inputs.runner == 'ubuntu-latest' && 'ubuntu-latest' || fromJson(inputs.runner) }}
    environment: pre-migration-validation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install prerequisites (GitHub-hosted only)
        if: ${{ inputs.runner == 'ubuntu-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq gh
          gh --version
          jq --version

      - name: Make scripts executable
        shell: bash
        run: chmod +x scripts/*.sh

      # readiness script expects scripts/repos.csv (hardcoded) [1](https://oneuptime.com/blog/post/2026-01-25-github-actions-environment-protection-rules/view)
      - name: Prepare repos.csv for scripts
        shell: bash
        run: |
          set -euo pipefail
          cp "${{ inputs.csv_path }}" scripts/repos.csv
          echo "✅ CSV prepared: ${{ inputs.csv_path }} → scripts/repos.csv"

      - name: (Optional) Connectivity check to GHES API
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -H "Authorization: token ${GH_SOURCE_PAT}" "${GHES_API_URL%/}/user" >/dev/null
          echo "✅ GHES API reachable"

      - name: Run pre-migration readiness checks
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/1_migration-readiness.sh | tee precheck.log

      - name: Publish stage summary (pre-validation)
        if: always()
        shell: bash
        run: |
          {
            echo "## ✅ Stage 1: Pre-migration validation"
            echo ""
            echo "**CSV:** \`${{ inputs.csv_path }}\` (copied to \`scripts/repos.csv\`)"
            echo ""
            echo "### Consolidated summary (from script output)"
            # Script prints these lines [1](https://oneuptime.com/blog/post/2026-01-25-github-actions-environment-protection-rules/view)
            grep -E "Total Repositories Processed:|Repositories with Active Pull Requests:|Repositories with Workflows \\(Running or Queued\\):|Repositories with Open Issues:" precheck.log \
              | sed 's/^/- /' || true
            echo ""
            echo "### Next"
            if [[ "${{ inputs.require_approval }}" == "true" && "${{ inputs.run_migration }}" == "true" ]]; then
              echo "- ⏸️ Approval gate enabled. Workflow will create an approval issue and wait for **/approve**."
            else
              echo "- ▶️ Approval gate disabled or migration stage not selected."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload pre-validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage1-precheck-${{ github.run_id }}
          path: |
            precheck.log
            scripts/repos.csv
          if-no-files-found: warn


  approval_gate:
    name: Approval Gate - Create issue & wait for /approve
    needs: [pre_migration_validation]
    if: ${{ always()
            && inputs.run_migration == 'true'
            && inputs.require_approval == 'true'
            && (needs.pre_migration_validation.result == 'success' || needs.pre_migration_validation.result == 'skipped') }}
    runs-on: ${{ inputs.runner == 'ubuntu-latest' && 'ubuntu-latest' || fromJson(inputs.runner) }}

    outputs:
      approval_issue_url: ${{ steps.create_issue.outputs.issue_url }}
      approval_issue_number: ${{ steps.create_issue.outputs.issue_number }}

    steps:
      - name: Install prerequisites (GitHub-hosted only)
        if: ${{ inputs.runner == 'ubuntu-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq gh
          gh --version
          jq --version

      - name: Create approval issue (no labels required)
        id: create_issue
        shell: bash
        run: |
          set -euo pipefail

          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TITLE="Approve GHES → GHEC migration (run #${{ github.run_id }})"
          APPROVER="${{ inputs.approver }}"
          TIMEOUT="${{ inputs.approval_timeout_minutes }}"

          BODY=$(cat <<EOF
          A migration run is ready to proceed to **Stage 2 (Migration)**.
          
          **Run:** ${RUN_URL}
          **Repository:** ${{ github.repository }}
          **Timeout:** ${TIMEOUT} minutes
          
          ### How to approve
          Add a comment containing:
          
          \`/approve\`
          
          EOF
                    )
          
                    # Mention team if org/team provided
                    if [[ -n "${APPROVER}" && "${APPROVER}" == */* ]]; then
                      BODY="${BODY}
          
          🔔 Notifying team: @${APPROVER}
          "
                    fi

          ASSIGNEE=()
          if [[ -n "${APPROVER}" && "${APPROVER}" != */* ]]; then
            ASSIGNEE=(--assignee "${APPROVER}")
          fi

          ISSUE_URL=$(gh issue create \
            --repo "${{ github.repository }}" \
            --title "${TITLE}" \
            --body "${BODY}" \
            "${ASSIGNEE[@]}")

          ISSUE_NUMBER=$(basename "$ISSUE_URL")
          echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "✅ Approval issue created: $ISSUE_URL"

          - name: Wait for approval (/approve)
            shell: bash
            run: |
              set -euo pipefail
    
              ISSUE="${{ steps.create_issue.outputs.issue_number }}"
              APPROVER="${{ inputs.approver }}"
              TIMEOUT_MIN="${{ inputs.approval_timeout_minutes }}"
              END=$(( $(date +%s) + TIMEOUT_MIN*60 ))
    
              echo "⏳ Waiting for /approve on issue #$ISSUE"
    
              while true; do
                if (( $(date +%s) > END )); then
                  echo "::error::Approval timeout after ${TIMEOUT_MIN} minutes"
                  exit 1
                fi
    
                # If approver is a username (not org/team), require that author.
                if [[ -n "$APPROVER" && "$APPROVER" != */* ]]; then
                  APPROVED=$(gh api repos/${{ github.repository }}/issues/$ISSUE/comments --paginate \
                    --jq "[.[] | select(.user.login==\"$APPROVER\") | select(.body | test(\"(^|\\\\n)/approve(\\\\n|$)\";\"i\"))] | length")
                else
                  APPROVED=$(gh api repos/${{ github.repository }}/issues/$ISSUE/comments --paginate \
                    --jq "[.[] | select(.body | test(\"(^|\\\\n)/approve(\\\\n|$)\";\"i\"))] | length")
                fi
    
                if [[ "$APPROVED" -gt 0 ]]; then
                  echo "✅ Approval received"
                  break
                fi
    
                sleep 30
              done
    
          - name: Publish approval gate summary
            if: always()
            shell: bash
            run: |
              {
                echo "## 🛂 Approval Gate"
                echo ""
                echo "- **Issue:** ${{ steps.create_issue.outputs.issue_url }}"
                echo "- **Approver input:** \`${{ inputs.approver }}\`"
                echo "- **Timeout:** \`${{ inputs.approval_timeout_minutes }} minutes\`"
                echo ""
                echo "✅ Gate passed if this job succeeded."
              } >> "$GITHUB_STEP_SUMMARY"


  migration:
    name: Stage 2 - Migration (after approval)
    needs: [pre_migration_validation, approval_gate]
    if: ${{ always()
            && inputs.run_migration == 'true'
            && (needs.pre_migration_validation.result == 'success' || needs.pre_migration_validation.result == 'skipped')
            && (needs.approval_gate.result == 'success' || needs.approval_gate.result == 'skipped') }}
    runs-on: ${{ inputs.runner == 'ubuntu-latest' && 'ubuntu-latest' || fromJson(inputs.runner) }}

    # Optional native pause if you configure environment reviewers [4](https://docs.github.com/en/migrations/using-github-enterprise-importer/migrating-between-github-products/migrating-repositories-from-github-enterprise-server-to-github-enterprise-cloud)
    environment: migration

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install prerequisites (GitHub-hosted only)
        if: ${{ inputs.runner == 'ubuntu-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq gh python3
          gh --version
          jq --version
          python3 --version

      - name: Install / update GitHub Enterprise Importer (GEI) extension
        shell: bash
        run: |
          set -euo pipefail
          gh extension install github/gh-gei || gh extension upgrade github/gh-gei
          gh gei --help >/dev/null

      - name: Make scripts executable
        shell: bash
        run: chmod +x scripts/*.sh

      - name: Prepare repos.csv for scripts
        shell: bash
        run: |
          set -euo pipefail
          cp "${{ inputs.csv_path }}" scripts/repos.csv
          echo "✅ CSV prepared: ${{ inputs.csv_path }} → scripts/repos.csv"

      - name: Run migration (parallel)
        shell: bash
        run: |
          set -euo pipefail
          # runner supports --max-concurrent, --csv, --output [2](https://www.youtube.com/watch?v=LS2lq1vMFws)
          ./scripts/2_migration.sh \
            --max-concurrent "${{ inputs.max_concurrent }}" \
            --csv "scripts/repos.csv" \
            --output repo_migration_output.csv \
            | tee migration.log

      - name: Publish migration summary (including migrated links)
        if: always()
        shell: bash
        run: |
          python3 - <<'PY'
          import csv, os, sys
          from pathlib import Path

          out = Path("repo_migration_output.csv")
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          def w(s=""):
            with open(summary_path, "a", encoding="utf-8") as f:
              f.write(s + "\n")

          w("## 🚀 Stage 2: Migration")
          w("")
          w(f"**Concurrency:** `{os.getenv('MAX_CONCURRENCY','${{ inputs.max_concurrent }}')}`")
          w(f"**GitHub-owned storage:** `{os.getenv('USE_GITHUB_STORAGE','${{ inputs.use_github_storage }}')}`")
          w(f"**Target API URL:** `{os.getenv('TARGET_API_URL','${{ inputs.target_api_url }}')}`")
          w("")
          w(f"**Approval issue:** ${{ needs.approval_gate.outputs.approval_issue_url }}")
          w("")

          if not out.exists():
            w("> [!CAUTION]")
            w("> `repo_migration_output.csv` not found. Check `migration.log`.")
            sys.exit(0)

          rows = []
          with out.open(newline="", encoding="utf-8") as f:
            reader = csv.DictReader(f)
            for r in reader:
              rows.append(r)

          success = sum(1 for r in rows if (r.get("Migration_Status","") or "").lower().startswith("success"))
          failure = sum(1 for r in rows if (r.get("Migration_Status","") or "").lower().startswith("failure"))
          w("### Result counts")
          w(f"- ✅ Success: **{success}**")
          w(f"- ❌ Failure: **{failure}**")
          w("")
          w("### Repository results")
          w("| Source (GHES) | Status | Target (GitHub) |")
          w("|---|---|---|")

          for r in rows:
            src = f"{r.get('ghes_org','')}/{r.get('ghes_repo','')}"
            status = r.get("Migration_Status","")
            tgt_org = r.get("github_org","")
            tgt_repo = r.get("github_repo","")
            if (status or "").lower().startswith("success") and tgt_org and tgt_repo:
              link = f"https://github.com/{tgt_org}/{tgt_repo}"
              w(f"| {src} | ✅ Success | {link} |")
            else:
              w(f"| {src} | ❌ {status} | - |")

          w("")
          w("### Artifacts")
          w("- `repo_migration_output.csv`, `migration.log`, `migration-*.txt`")
          PY

      - name: Upload migration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage2-migration-${{ github.run_id }}
          path: |
            migration.log
            repo_migration_output.csv
            migration-*.txt
          if-no-files-found: warn


  post_migration_validation:
    name: Stage 3 - Post-migration validation
    needs: [pre_migration_validation, migration]
    if: ${{ always()
            && inputs.run_post_validation == 'true'
            && (needs.pre_migration_validation.result == 'success' || needs.pre_migration_validation.result == 'skipped')
            && (needs.migration.result == 'success' || needs.migration.result == 'skipped') }}
    runs-on: ${{ inputs.runner == 'ubuntu-latest' && 'ubuntu-latest' || fromJson(inputs.runner) }}
    environment: post-migration-validation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install prerequisites (GitHub-hosted only)
        if: ${{ inputs.runner == 'ubuntu-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq gh
          gh --version
          jq --version

      - name: Make scripts executable
        shell: bash
        run: chmod +x scripts/*.sh

      # script expects scripts/repos.csv (hardcoded) [3](https://docs.github.com/en/actions/reference/workflows-and-actions/deployments-and-environments)
      - name: Prepare repos.csv for scripts
        shell: bash
        run: |
          set -euo pipefail
          cp "${{ inputs.csv_path }}" scripts/repos.csv
          echo "✅ CSV prepared: ${{ inputs.csv_path }} → scripts/repos.csv"

      - name: Run post-migration validation
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/3_post_migration_validation.sh | tee post_validation.log

      - name: Publish post-validation summary
        if: always()
        shell: bash
        run: |
          {
            echo "## 🔎 Stage 3: Post‑migration validation"
            echo ""
            echo "### Indicators (from script output/log)"
            echo "- ❌ ERROR lines: **$(grep -c \"ERROR\" post_validation.log || true)**"
            echo "- ⚠️ ❌ Not Matching lines: **$(grep -c \"❌ Not Matching\" post_validation.log || true)**"
            echo ""
            echo "### Artifacts"
            echo "- \`post_validation.log\`, \`validation-log-*.txt\`, \`validation-*.json\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload post-validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage3-postvalidation-${{ github.run_id }}
          path: |
            post_validation.log
            validation-log-*.txt
            validation-*.json
          if-no-files-found: warn
