name: GHES → GHEC Migration via Actions (GEI)

on:
  workflow_dispatch:
    inputs:
      runner:
        description: >
          Runner selector. Use ubuntu-latest for GitHub-hosted.
          For self-hosted, provide JSON labels e.g. ["self-hosted","linux","x64","ghes-migration"].
          NOTE: GitHub selects self-hosted runners by LABELS, not by runner machine name.
        required: true
        default: "ubuntu-latest"

      csv_path:
        description: Path to repos.csv in this repository (root or scripts/)
        required: true
        default: repos.csv

      max_concurrent:
        description: Max parallel migrations (keep <= 5)
        required: true
        default: "5"

      use_github_storage:
        description: Pass --use-github-storage to GEI (if enabled for your org)
        required: true
        default: "true"

      target_api_url:
        description: Optional (GHE.com data residency): https://api.SUBDOMAIN.ghe.com
        required: false
        default: ""

      run_pre_validation:
        description: Run Stage 1 - pre-migration validation
        required: true
        default: "true"

      run_migration:
        description: Run Stage 2 - migration
        required: true
        default: "true"

      run_post_validation:
        description: Run Stage 3 - post-migration validation
        required: true
        default: "true"

      require_approval:
        description: Require approval between Stage 1 and Stage 2 (issue-based gate)
        required: true
        default: "true"

      approver:
        description: >
          Approver GitHub username OR team slug (org/team).
          If username provided, issue will be assigned; if team, it will be mentioned in issue body.
        required: false
        default: ""

      approval_timeout_minutes:
        description: How long to wait for approval (minutes)
        required: true
        default: "720"   # 12 hours

env:
  # gh CLI auth in Actions
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

  # GEI + scripts
  GH_PAT: ${{ secrets.GH_PAT }}
  GH_SOURCE_PAT: ${{ secrets.GH_SOURCE_PAT }}
  GHES_API_URL: ${{ secrets.GHES_API_URL }}

  # Optional migration behavior (supported by the migration runner)
  USE_GITHUB_STORAGE: ${{ inputs.use_github_storage }}
  TARGET_API_URL: ${{ inputs.target_api_url }}

permissions:
  contents: read
  issues: write    # needed to create/read approval issue
  actions: read

jobs:
  pre_migration_validation:
    name: Stage 1 - Pre-migration validation
    if: ${{ inputs.run_pre_validation == 'true' }}
    runs-on: ${{ inputs.runner == 'ubuntu-latest' && 'ubuntu-latest' || fromJson(inputs.runner) }}
    environment: pre-migration-validation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GitHub-hosted convenience. For self-hosted, ensure gh/jq are preinstalled.
      - name: Install prerequisites (GitHub-hosted only)
        if: ${{ inputs.runner == 'ubuntu-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq gh
          gh --version
          jq --version

      - name: Make scripts executable
        shell: bash
        run: chmod +x scripts/*.sh

      # Pre-validation script expects scripts/repos.csv (hardcoded) [2](https://oneuptime.com/blog/post/2026-01-25-github-actions-environment-protection-rules/view)
      - name: Prepare repos.csv for scripts
        shell: bash
        run: |
          set -euo pipefail
          cp "${{ inputs.csv_path }}" scripts/repos.csv
          echo "✅ CSV prepared: ${{ inputs.csv_path }} → scripts/repos.csv"

      - name: (Optional) Connectivity check to GHES API
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking GHES API reachability..."
          curl -fsSL -H "Authorization: token ${GH_SOURCE_PAT}" "${GHES_API_URL%/}/user" >/dev/null
          echo "✅ GHES API reachable"

      - name: Run pre-migration readiness checks
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/1_migration-readiness.sh | tee precheck.log

      - name: Publish stage summary (pre-validation)
        if: always()
        shell: bash
        run: |
          {
            echo "## ✅ Stage 1: Pre-migration validation"
            echo ""
            echo "**CSV:** \`${{ inputs.csv_path }}\` (copied to \`scripts/repos.csv\`)"
            echo ""
            echo "### Consolidated summary"
            # These lines are printed by your script [2](https://oneuptime.com/blog/post/2026-01-25-github-actions-environment-protection-rules/view)
            grep -E "Total Repositories Processed:|Repositories with Active Pull Requests:|Repositories with Workflows \\(Running or Queued\\):|Repositories with Open Issues:" precheck.log \
              | sed 's/^/- /' || true
            echo ""
            echo "### Next step"
            echo "- If approval gate is enabled, workflow will create an approval issue and wait for **/approve**."
            echo ""
            echo "### Artifacts"
            echo "- \`precheck.log\` and \`scripts/repos.csv\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload pre-validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage1-precheck-${{ github.run_id }}
          path: |
            precheck.log
            scripts/repos.csv
          if-no-files-found: warn


  approval_gate:
    name: Approval Gate - Create issue & wait for approval
    needs: [pre_migration_validation]
    if: ${{ always() && inputs.run_migration == 'true' && inputs.require_approval == 'true' && (needs.pre_migration_validation.result == 'success' || needs.pre_migration_validation.result == 'skipped') }}
    runs-on: ${{ inputs.runner == 'ubuntu-latest' && 'ubuntu-latest' || fromJson(inputs.runner) }}

    outputs:
      approval_issue_url: ${{ steps.create_issue.outputs.issue_url }}
      approval_issue_number: ${{ steps.create_issue.outputs.issue_number }}

    steps:
      - name: Install prerequisites (GitHub-hosted only)
        if: ${{ inputs.runner == 'ubuntu-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq gh
          gh --version
          jq --version

      - name: Create approval issue
        id: create_issue
        shell: bash
        run: |
          set -euo pipefail

          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TITLE="Approve GHES→GHEC migration run #${{ github.run_id }}"
          APPROVER="${{ inputs.approver }}"
          TIMEOUT="${{ inputs.approval_timeout_minutes }}"

          BODY_FILE="$(mktemp)"
          {
            echo "A migration run is ready to proceed to **Stage 2 (Migration)**."
            echo ""
            echo "**Run:** ${RUN_URL}"
            echo "**Repo:** ${{ github.repository }}"
            echo "**Run ID:** ${{ github.run_id }}"
            echo ""
            echo "### How to approve"
            echo "Add a comment with:"
            echo ""
            echo "\`/approve\`"
            echo ""
            echo "Alternatively, add the label **approved** to this issue."
            echo ""
            echo "### Timeout"
            echo "This gate will time out after **${TIMEOUT} minutes**."
            echo ""
            if [[ -n "${APPROVER}" ]]; then
              echo "### Requested approver"
              echo "${APPROVER}"
            fi
          } > "$BODY_FILE"

          # If approver looks like org/team -> mention in body, cannot assign.
          ASSIGNEE_FLAG=()
          if [[ -n "${APPROVER}" ]]; then
            if [[ "${APPROVER}" == */* ]]; then
              echo "" >> "$BODY_FILE"
              echo "🔔 Notifying team: @${APPROVER}" >> "$BODY_FILE"
            else
              ASSIGNEE_FLAG=(--assignee "${APPROVER}")
            fi
          fi

          # Create issue
          ISSUE_URL=$(gh issue create \
            --repo "${{ github.repository }}" \
            --title "${TITLE}" \
            --body-file "$BODY_FILE" \
            --label "migration-approval" \
            "${ASSIGNEE_FLAG[@]}")

          # Extract issue number
          ISSUE_NUMBER=$(echo "$ISSUE_URL" | awk -F'/' '{print $NF}')

          echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"

          echo "Created approval issue: $ISSUE_URL"

      - name: Wait for approval (/approve or label approved)
        shell: bash
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ steps.create_issue.outputs.issue_number }}"
          APPROVER="${{ inputs.approver }}"
          TIMEOUT_MIN="${{ inputs.approval_timeout_minutes }}"
          END_TIME=$(( $(date +%s) + (TIMEOUT_MIN*60) ))

          echo "Waiting for approval on issue #${ISSUE_NUMBER} (timeout: ${TIMEOUT_MIN} minutes)..."
          echo "Approver input: '${APPROVER}'"

          while true; do
            now=$(date +%s)
            if (( now > END_TIME )); then
              echo "::error::Approval timeout reached (${TIMEOUT_MIN} minutes)."
              exit 1
            fi

            # Check labels first
            labels=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}" --jq '.labels[].name' 2>/dev/null || true)
            if echo "$labels" | grep -qi "^approved$"; then
              echo "✅ Approved via label 'approved'."
              break
            fi

            # Check comments for /approve
            # If APPROVER provided and is a username (not org/team), require that author.
            if [[ -n "${APPROVER}" && "${APPROVER}" != */* ]]; then
              approved=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments" --paginate \
                --jq "[.[] | select(.user.login==\"${APPROVER}\") | select((.body // \"\") | test(\"(^|\\\\n)/approve(\\\\n|$)\";\"i\"))] | length" 2>/dev/null || echo 0)
            else
              approved=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments" --paginate \
                --jq "[.[] | select((.body // \"\") | test(\"(^|\\\\n)/approve(\\\\n|$)\";\"i\"))] | length" 2>/dev/null || echo 0)
            fi

            if [[ "${approved}" != "0" ]]; then
              echo "✅ Approved via /approve comment."
              break
            fi

            echo "Still waiting... (sleep 30s)"
            sleep 30
          done

      - name: Publish approval gate summary
        if: always()
        shell: bash
        run: |
          {
            echo "## 🛂 Approval Gate"
            echo ""
            echo "- **Issue:** ${{ steps.create_issue.outputs.issue_url }}"
            echo "- **Approver input:** \`${{ inputs.approver }}\`"
            echo "- **Timeout:** \`${{ inputs.approval_timeout_minutes }} minutes\`"
            echo ""
            echo "✅ Gate completed (approved) OR ❌ failed (timeout)."
          } >> "$GITHUB_STEP_SUMMARY"


  migration:
    name: Stage 2 - Migration
    needs: [pre_migration_validation, approval_gate]
    if: ${{ always() && inputs.run_migration == 'true'
            && (needs.pre_migration_validation.result == 'success' || needs.pre_migration_validation.result == 'skipped')
            && (needs.approval_gate.result == 'success' || needs.approval_gate.result == 'skipped') }}
    runs-on: ${{ inputs.runner == 'ubuntu-latest' && 'ubuntu-latest' || fromJson(inputs.runner) }}

    # Optional extra safety:
    # If you configure Settings → Environments → "migration" → Required reviewers,
    # GitHub will pause this job until approved. [1](https://docs.github.com/en/migrations/using-github-enterprise-importer/migrating-between-github-products/migrating-repositories-from-github-enterprise-server-to-github-enterprise-cloud)
    environment: migration

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install prerequisites (GitHub-hosted only)
        if: ${{ inputs.runner == 'ubuntu-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq gh
          gh --version
          jq --version

      - name: Install / update GitHub Enterprise Importer (GEI) extension
        shell: bash
        run: |
          set -euo pipefail
          gh extension install github/gh-gei || gh extension upgrade github/gh-gei
          gh gei --help >/dev/null

      - name: Make scripts executable
        shell: bash
        run: chmod +x scripts/*.sh

      - name: Prepare repos.csv for scripts
        shell: bash
        run: |
          set -euo pipefail
          cp "${{ inputs.csv_path }}" scripts/repos.csv
          echo "✅ CSV prepared: ${{ inputs.csv_path }} → scripts/repos.csv"

      - name: Run migration (parallel)
        shell: bash
        run: |
          set -euo pipefail
          # Migration runner supports --max-concurrent, --csv, --output [3](https://www.youtube.com/watch?v=LS2lq1vMFws)
          ./scripts/2_migration.sh \
            --max-concurrent "${{ inputs.max_concurrent }}" \
            --csv "scripts/repos.csv" \
            --output repo_migration_output.csv \
            | tee migration.log

      - name: Publish stage summary (migration)
        if: always()
        shell: bash
        run: |
          {
            echo "## 🚀 Stage 2: Migration"
            echo ""
            echo "**Concurrency:** \`${{ inputs.max_concurrent }}\`"
            echo "**GitHub-owned storage:** \`${{ inputs.use_github_storage }}\`"
            echo "**Target API URL:** \`${{ inputs.target_api_url }}\`"
            echo ""
            if [[ -f repo_migration_output.csv ]]; then
              echo "### Result counts (from repo_migration_output.csv)"
              success=$(awk -F',' 'NR>1 && $6 ~ /Success/ {c++} END{print c+0}' repo_migration_output.csv)
              failure=$(awk -F',' 'NR>1 && $6 ~ /Failure/ {c++} END{print c+0}' repo_migration_output.csv)
              echo "- ✅ Success: **$success**"
              echo "- ❌ Failure: **$failure**"
              echo ""
              echo "### Outputs"
              echo "- \`repo_migration_output.csv\`"
              echo "- \`migration-*.txt\` (per repo logs)"
            else
              echo "> [!CAUTION]"
              echo "> \`repo_migration_output.csv\` not found. Check \`migration.log\`."
            fi
            echo ""
            echo "### Approval"
            echo "- Approval issue: ${{ needs.approval_gate.outputs.approval_issue_url }}"
            echo ""
            echo "### Artifacts"
            echo "- \`migration.log\`, \`repo_migration_output.csv\`, \`migration-*.txt\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload migration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage2-migration-${{ github.run_id }}
          path: |
            migration.log
            repo_migration_output.csv
            migration-*.txt
          if-no-files-found: warn


  post_migration_validation:
    name: Stage 3 - Post-migration validation
    needs: [pre_migration_validation, migration]
    if: ${{ always() && inputs.run_post_validation == 'true'
            && (needs.pre_migration_validation.result == 'success' || needs.pre_migration_validation.result == 'skipped')
            && (needs.migration.result == 'success' || needs.migration.result == 'skipped') }}
    runs-on: ${{ inputs.runner == 'ubuntu-latest' && 'ubuntu-latest' || fromJson(inputs.runner) }}
    environment: post-migration-validation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install prerequisites (GitHub-hosted only)
        if: ${{ inputs.runner == 'ubuntu-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq gh
          gh --version
          jq --version

      - name: Make scripts executable
        shell: bash
        run: chmod +x scripts/*.sh

      # Post-validation script expects scripts/repos.csv (hardcoded) [4](https://docs.github.com/en/actions/reference/workflows-and-actions/deployments-and-environments)
      - name: Prepare repos.csv for scripts
        shell: bash
        run: |
          set -euo pipefail
          cp "${{ inputs.csv_path }}" scripts/repos.csv
          echo "✅ CSV prepared: ${{ inputs.csv_path }} → scripts/repos.csv"

      - name: Run post-migration validation
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/3_post_migration_validation.sh | tee post_validation.log

      - name: Publish stage summary (post-validation)
        if: always()
        shell: bash
        run: |
          {
            echo "## 🔎 Stage 3: Post-migration validation"
            echo ""
            echo "### Quick indicators"
            echo "- ❌ ERROR lines: **$(grep -c \"ERROR\" post_validation.log || true)**"
            echo "- ⚠️ ❌ Not Matching lines: **$(grep -c \"❌ Not Matching\" post_validation.log || true)**"
            echo ""
            echo "### Artifacts"
            echo "- \`post_validation.log\`, \`validation-log-*.txt\`, \`validation-*.json\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload post-validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage3-postvalidation-${{ github.run_id }}
          path: |
            post_validation.log
            validation-log-*.txt
            validation-*.json
          if-no-files-found: warn
